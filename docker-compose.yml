version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ownventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ownventory_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ownventory}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ownventory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ownventory}:${POSTGRES_PASSWORD:-ownventory_secret}@db:5432/${POSTGRES_DB:-ownventory}
      NODE_ENV: production
      EBAY_APP_ID: ${EBAY_APP_ID:-}
    volumes:
      - uploads-data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
  uploads-data:
